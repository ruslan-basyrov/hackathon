# Phases 1-2 — simulation skeleton + per-persona coach
seed: 0
n_episodes: 10000          # quick demo run; acceptance tests use a larger N

# Synthetic final-vs-provisional price gap: final = provisional * (1 + surcharge).
# Real distribution is a documented unknown (BUILD_SPEC §4).
surcharge:
  low: 0.0
  high: 0.15

tariff_prices:             # the two in-scope (online-purchasable) tariffs
  Start: 38.74
  Optimal: 68.14

dwell_mean_s: 12.0         # base per-screen dwell; scaled per persona by dwell_mult

# Out-of-scope branch routing (hospital / others). Off in Phase 1-2 (wired, unused).
p_out_of_scope_branch: 0.0

# Trace sampling: full step traces written for the first N episodes (the demo output).
trace_sample: 5

# --- Per-persona profiles (Phase 2) -----------------------------------------
# `p_dropoff`: conditional abandonment per step. `global` reproduces the Phase 1
# baseline (0.34 * 0.76 * 0.22 ~= 5.68%). Per-persona values are HYPOTHESES placing
# each persona's primary drop at its documented step (BUILD_SPEC §5; track docs).
personas:
  global:
    p_dropoff: {S4: 0.66, S6: 0.24, S7: 0.78}
  judith:                                  # Rising Hybrid — drops at the initial price
    p_dropoff: {S4: 0.78, S7: 0.30}
    dwell_mult: {S4: 3.0}                  # lingers on the price table (the trigger)
    sig_hovers: {S4: 3}                    # hovers tariffs (incl. advisory-only ones)
    advisory_interest: true                # a SIGNAL only — no longer a detection trigger
  franz:                                   # Online Affine — drops at the final price
    p_dropoff: {S4: 0.25, S7: 0.82}
    dwell_mult: {S1: 0.4, S2: 0.4, S3: 0.4}   # blasts through early; low S4 dwell -> not coached at S4
    sig_hovers: {S4: 1}
    advisory_interest: true                # glances at Premium (signal, not a trigger)
    external_tab: true                     # comparison tab
    s7_cancel: true                        # hovers cancel at the final price (the trigger)
  peter:                                   # Service Affine — heterogeneous: most overwhelmed, some confident
    confident_prob: 0.35                   # fraction who self-serve (low dwell, no re-edits -> not routed)
    p_dropoff: {S3: 0.55, S4: 0.55}        # struggling-mode drop (without help)
    confident_p_dropoff: {S3: 0.10, S4: 0.15}  # confident-mode drop (self-serves online)
    dwell_mult: {S1: 2.5, S2: 2.5, S3: 3.5}    # struggling-mode dwell
    sig_changes: {S1: 1, S2: 1, S3: 2}         # struggling-mode form re-edits (the trigger)

# --- Detection (Phase 2 thresholds + Phase 3 GBM) ---------------------------
# `method` swaps backends behind the frozen detect(signals, cfg) interface:
#   * threshold  -> Phase 2 hand-written rules (default; runs with no model file)
#   * gbm        -> Phase 3 xgboost classifier loaded from `gbm_model_path`
detection:
  method: threshold                # threshold | gbm
  # threshold backend (Phase 2)
  dwell_threshold_s: 25.0          # S4 hesitation (Judith)
  overwhelm_changes: 2             # early form re-edits to count as overwhelmed (Peter)
  early_overwhelm_max_steps: 4     # ... while still early (max_steps_completed < 4)
  price_gap_threshold: 4.0         # S7 sticker shock (Franz)
  back_nav_threshold: 2
  # GBM backend (Phase 3) - the artefact is written by training/train_gbm.py
  gbm_model_path: models/gbm.json
  gbm_threshold: 0.5               # fire when predict_proba(abandon) >= this

# Assumed stay-intervention drop-off reduction (a PARAMETER in P1-P3, not measured;
# real efficacy is tested only when LLM bots react to wording in P4-P5).
intervention_effectiveness:
  default: 0.45

# Probability a persona accepts a proactive handoff/callback.
handoff_accept_prob:
  judith: 0.70
  peter: 0.85

# --- used from Phase 4 (inference) — the only model-swap knobs ---
# Default points at the local docker-compose inference service on port 8003
# (8000 is Coolify on this host; 8002 is uniqa-advisor-vllm-1). Override via
# env or by editing here when pointing at a remote endpoint / different model.
inference_base_url: "http://localhost:8003/v1"
model_name: "qwen2.5-1.5b-instruct"

# --- Phase 4: realize() backend ---------------------------------------------
# `method` picks template (Phase 2-3) or LLM (Phase 4) for intervention wording.
# Default is `template` so the Phase 2/3 contract holds with no inference
# server running. Flip to `llm` (+ start a local model, see services/inference/)
# to get persona-tailored wording. The graceful_fallback path is what makes
# the §Phase 4 degradation test decisive: even with method=llm, an unreachable
# endpoint falls back to templates and the simulator's decisions are unchanged.
realize:
  method: llm                 # template | llm
  graceful_fallback: true          # on LLM failure -> use template wording
  timeout_s: 3.0                   # short so UI clicks never feel frozen; the
                                   # UI also wraps the call in run.io_bound so
                                   # the event loop stays responsive
  max_tokens: 120
  temperature: 0.7

inference_api_key: "local"         # most local servers ignore this

# --- used from Phase 3 (tracking) ---
wandb_project: "conversion-coach"
